name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for trailing whitespace
      run: |
        if git diff --check HEAD^ HEAD; then
          echo "✓ No trailing whitespace found"
        else
          echo "✗ Trailing whitespace found"
          exit 1
        fi
      continue-on-error: true

    - name: Check file sizes
      run: |
        echo "Checking for large files..."
        find . -type f -size +5M -not -path "./.git/*" -not -path "./backend/mongodb/*" -not -path "./backend/mongodb-data/*" -not -path "./data/*"

    - name: Validate JSON files
      run: |
        echo "Validating JSON files..."
        find . -name "*.json" -not -path "./.git/*" -not -path "./node_modules/*" | while read file; do
          if ! python -m json.tool "$file" > /dev/null 2>&1; then
            echo "✗ Invalid JSON: $file"
          else
            echo "✓ Valid JSON: $file"
          fi
        done

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Lint Markdown files
      uses: articulate/actions-markdownlint@v1
      continue-on-error: true
      with:
        config: .markdownlint.json
        files: '**/*.md'
        ignore: node_modules

  check-links:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check links in README
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/markdown-link-check-config.json'
      continue-on-error: true
